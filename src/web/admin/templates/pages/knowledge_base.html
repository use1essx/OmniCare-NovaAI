{% extends "base.html" %}
{% block title %}Knowledge Base{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Knowledge Base</h2>
  <div class="card mb-3">
    <div class="card-body">
      <form id="kbUploadForm">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label">Title</label>
            <input class="form-control" name="title" required />
          </div>
          <div class="col-md-2">
            <label class="form-label">Category</label>
            <input class="form-control" name="category" value="general" list="kb-category-list" />
            <datalist id="kb-category-list"></datalist>
          </div>
          <div class="col-md-2">
            <label class="form-label">Visibility</label>
            <select class="form-select" name="visibility">
              <option value="org">Org</option>
              <option value="public">Public</option>
              <option value="private">Private</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Language</label>
            <select class="form-select" name="language">
              <option value="en">English</option>
              <option value="zh-HK">zh-HK</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Tags (comma)</label>
            <input class="form-control" name="tags" />
          </div>
        </div>
        <div class="row g-2 mt-2">
          <div class="col-md-4">
            <label class="form-label">Topics (comma)</label>
            <input class="form-control" name="topics" list="kb-topics-list" />
            <datalist id="kb-topics-list"></datalist>
          </div>
          <div class="col-md-4">
            <label class="form-label">Age Groups (comma)</label>
            <input class="form-control" name="age_groups" list="kb-age-groups-list" />
            <datalist id="kb-age-groups-list"></datalist>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div class="form-check me-3">
              <input class="form-check-input" type="checkbox" name="auto_tag" id="kbAutoTag" checked />
              <label class="form-check-label" for="kbAutoTag">Auto Tag</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="auto_summary" id="kbAutoSummary" checked />
              <label class="form-check-label" for="kbAutoSummary">Auto Summary</label>
            </div>
          </div>
        </div>
        <div class="row g-2 mt-2">
          <div class="col-md-6">
            <label class="form-label">File</label>
            <input class="form-control" type="file" name="file" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Or Paste Text</label>
            <textarea class="form-control" name="text_content" rows="3"></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Upload</button>
          <span id="kbUploadStatus" class="ms-2 text-muted"></span>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <h5 class="card-title mb-0">Documents</h5>
        <button class="btn btn-outline-secondary btn-sm" id="kbRefreshBtn">Refresh</button>
      </div>
      <div class="table-responsive mt-3">
        <table class="table table-sm align-middle" id="kbTable">
          <thead>
            <tr>
              <th>Title</th><th>Category</th><th>Visibility</th><th>Status</th><th>Chunks</th><th>Org</th><th>Indexed</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <h5 class="card-title mb-0">Global Taxonomy</h5>
        <button class="btn btn-outline-secondary btn-sm" id="kbTaxonomyRefresh">Refresh</button>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-md-6">
          <label class="form-label">New Category</label>
          <div class="input-group">
            <input class="form-control" id="kbTaxCategory" placeholder="e.g. development" />
            <button class="btn btn-outline-primary" id="kbTaxCategoryAdd" type="button">Add</button>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">New Topic</label>
          <div class="input-group">
            <input class="form-control" id="kbTaxTopic" placeholder="e.g. gross motor" />
            <button class="btn btn-outline-primary" id="kbTaxTopicAdd" type="button">Add</button>
          </div>
        </div>
      </div>
      <div class="table-responsive mt-3">
        <div class="mb-2">
          <div class="input-group input-group-sm">
            <input class="form-control" id="kbTaxonomyFilter" placeholder="Filter taxonomy..." />
            <button class="btn btn-outline-secondary" type="button" id="kbTaxonomyFilterClear">Clear</button>
          </div>
        </div>
        <table class="table table-sm align-middle" id="kbTaxonomyTable">
          <thead>
            <tr>
              <th>Type</th><th>Value</th><th>Count</th><th>Source</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="text-muted small">Manual entries can be edited or removed. Document-derived entries are read-only.</div>
    </div>
  </div>
</div>

<script src="/static/js/pages/knowledge-base.js"></script>
{% endblock %}
