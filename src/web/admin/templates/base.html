<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OmniCare Admin{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="/static/css/admin.css?v=2">
    <link rel="stylesheet" href="/static/css/admin-layout.css?v=2">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Alpine.js Plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="h-full antialiased text-slate-900" 
      x-data="{ 
          sidebarOpen: false,
          toggleSidebar() { this.sidebarOpen = !this.sidebarOpen },
          closeSidebar() { this.sidebarOpen = false }
      }">

    <div class="admin-layout">
        <!-- Mobile Backdrop -->
        <div class="mobile-backdrop" 
             :class="{ 'is-visible': sidebarOpen }"
             @click="closeSidebar()"></div>

        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Content Wrapper -->
        <div class="admin-main">
            <!-- Header -->
            {% include 'components/header.html' %}

            <!-- Page Content -->
            <main class="admin-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="/static/js/core/utils.js"></script>
    <script src="/static/js/core/api-client.js"></script>
    <script src="/static/js/core/state-manager.js"></script>
    <script src="/static/js/core/base-component.js"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
